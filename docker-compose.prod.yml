services:
  bot:
    image: ghcr.io/emberigor/mingyibot:latest
    container_name: mingyi-bot
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    env_file:
      - .env
    environment:
      DRIVER: "~fastapi"
      HOST: "0.0.0.0"
      PORT: "8080"
      COMMAND_START: '["/"]'
    ports:
      - "${BOT_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
