services:
  bot:
    build:
      context: .
      args:
        MINGYI_VERSION: "${MINGYI_VERSION:-dev}"
    container_name: mingyi-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DRIVER: "~fastapi"
      HOST: "0.0.0.0"
      PORT: "8080"
      COMMAND_START: '["/"]'
    ports:
      - "${BOT_PORT:-8080}:8080"
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./logs:/app/logs
